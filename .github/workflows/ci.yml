name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Boot Simulator
        run: |
          xcrun simctl list devices available | grep "iPhone" | head -5
          SIMULATOR_ID=$(xcrun simctl list devices available -j | python3 -c "
            import json, sys
            data = json.load(sys.stdin)
            for runtime in data['devices']:
                if 'iOS' in runtime:
                    for device in data['devices'][runtime]:
                        if device['name'] == 'iPhone 16' and device['isAvailable']:
                            print(device['udid'])
                            sys.exit(0)
            sys.exit(1)
          ")
          echo "Booting iPhone 16 ($SIMULATOR_ID)"
          xcrun simctl boot "$SIMULATOR_ID" 2>/dev/null || true
          xcrun simctl list devices booted

      - name: Cache SPM & DerivedData
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: xcode-${{ runner.os }}-${{ hashFiles('StressMonitor/StressMonitor.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: xcode-${{ runner.os }}-

      - name: Build & Test
        working-directory: StressMonitor
        run: |
          xcodebuild test \
            -project StressMonitor.xcodeproj \
            -scheme StressMonitor \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -destination-timeout 120 \
            -only-testing:StressMonitorTests \
            -resultBundlePath build/TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            CI=1

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: StressMonitor/build/TestResults.xcresult
          retention-days: 7
