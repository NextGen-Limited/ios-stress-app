name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Print Xcode version
        run: |
          xcodebuild -version
          xcrun simctl list devices available | grep "iPhone" | head -5

      - name: Cache SPM & DerivedData
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            ~/Library/Developer/Xcode/DerivedData
          key: xcode-${{ runner.os }}-${{ hashFiles('StressMonitor/StressMonitor.xcodeproj/project.xcworkspace/xcshareddata/swiftpm/Package.resolved') }}
          restore-keys: xcode-${{ runner.os }}-

      - name: Build & Test
        working-directory: StressMonitor
        run: |
          set -o pipefail
          mkdir -p build/reports
          xcodebuild test \
            -project StressMonitor.xcodeproj \
            -scheme StressMonitor \
            -destination "platform=iOS Simulator,name=iPhone 16,OS=latest" \
            -only-testing:StressMonitorTests \
            CODE_SIGNING_ALLOWED=NO \
            CI=1 \
            2>&1 | tee build/build.log \
            | if command -v xcpretty &>/dev/null; then xcpretty --color --report junit --output build/reports/junit.xml; else cat; fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: StressMonitor/build/reports/
          retention-days: 7
